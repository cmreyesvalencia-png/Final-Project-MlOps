name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn xgboost fastapi uvicorn pytest
    
    - name: Check Python syntax
      run: |
        python -m py_compile api.py
        python -m py_compile train_model.py
    
    - name: Test API imports
      run: |
        python -c "from api import app; print('API imports OK')"
    
    - name: Run validation
      run: |
        python -c "print('All tests passed!')"
